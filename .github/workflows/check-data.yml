name: Check latest data daily

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: data-check
  cancel-in-progress: true

jobs:
  scrape-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch data branch
        run: git fetch origin data:data

      - name: Prepare data worktree
        run: git worktree add ../data-branch data

      - uses: astral-sh/setup-uv@v5

      - name: Capture current snapshot size
        id: before-count
        run: |
          count=$(find ../data-branch/data -maxdepth 1 -name '*.yaml' | wc -l | tr -d ' ')
          echo "value=$count" >> "$GITHUB_OUTPUT"

      - name: Scrape latest available declarations
        run: |
          uv run python scrape.py --workers 16 --data-dir ../data-branch/data \
            --supplementary-ids supplementary_user_ids.txt

      - name: Generate declaration content hashes
        run: |
          uv run python generate_content_hashes.py \
            --data-dir ../data-branch/data \
            --output ../data-branch/data/_checks/content-hashes.json

      - name: Guard against suspicious data loss
        run: |
          before=${{ steps.before-count.outputs.value }}
          after=$(find ../data-branch/data -maxdepth 1 -name '*.yaml' | wc -l | tr -d ' ')
          drop=$((before - after))

          if [ "$before" -gt 0 ] && [ "$after" -lt "$before" ] && [ "$drop" -gt 25 ] && [ $((after * 100)) -lt $((before * 95)) ]; then
            echo "Refusing to commit a suspicious drop from $before to $after declarations."
            exit 1
          fi

      - name: Detect latest reporting year
        id: latest-year
        run: |
          latest_year=$(python - <<'PY'
          from pathlib import Path
          import yaml

          latest = 0
          for path in Path("../data-branch/data").glob("*.yaml"):
              data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
              year = data.get("year")
              if isinstance(year, int):
                  latest = max(latest, year)

          if not latest:
              raise SystemExit("No scraped declarations found.")

          print(latest)
          PY
          )
          echo "value=$latest_year" >> "$GITHUB_OUTPUT"

      - name: Commit updated data snapshot
        id: commit-data
        working-directory: ../data-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream data changes detected."
            exit 0
          fi

          git commit -F - <<EOF
          data: daily declaration baseline

          Daily scrape of the latest available NR SR declarations.
          The commit message intentionally omits the reporting year so
          that build_site.py does not treat this mixed-year snapshot as
          a single-year data commit.

          - Re-scrape the latest available NR SR declarations into \`data/\`
          - Store content hashes in \`data/_checks/content-hashes.json\`
          - Latest reporting year detected: ${{ steps.latest-year.outputs.value }}
          EOF

          git push origin HEAD:data
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages rebuild
        if: steps.commit-data.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Clean up worktree
        if: always()
        run: git worktree remove ../data-branch --force
