name: Check latest data daily

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: data-check
  cancel-in-progress: false

jobs:
  scrape-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch data branch
        run: git fetch origin data:data

      - name: Prepare data worktree
        run: git worktree add ../data-branch data

      - uses: astral-sh/setup-uv@v5

      - name: Capture current snapshot size
        id: before-count
        run: |
          count=$(find ../data-branch/data -maxdepth 1 -name '*.yaml' | wc -l | tr -d ' ')
          echo "value=$count" >> "$GITHUB_OUTPUT"

      - name: Scrape latest live declarations
        timeout-minutes: 90
        run: |
          uv run python scrape.py --workers 3 --data-dir ../data-branch/data \
            --request-retries 0 \
            --request-timeout 12 \
            --request-delay 0.4 \
            --request-jitter 0.6 \
            --report-json scrape-live-report.json \
            --failed-ids-output failed-live-ids.txt

      - name: Evaluate live scrape health
        id: live-scrape-quality
        run: |
          uv run python .github/scripts/scrape_health.py \
            --report scrape-live-report.json \
            --github-output "$GITHUB_OUTPUT" \
            --step-summary "$GITHUB_STEP_SUMMARY" \
            --repo "$GITHUB_REPOSITORY" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --emit-annotation

      - name: Notify Discord about live scrape health warnings
        if: steps.live-scrape-quality.outputs.notify == 'true'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          uv run python .github/scripts/scrape_health.py \
            --report scrape-live-report.json \
            --repo "$GITHUB_REPOSITORY" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --discord

      - name: Scrape supplementary declarations
        if: steps.live-scrape-quality.outputs.commit_ok == 'true'
        timeout-minutes: 90
        run: |
          uv run python scrape.py --workers 1 --data-dir ../data-branch/data \
            --only-supplementary \
            --supplementary-ids supplementary_user_ids.txt \
            --request-retries 1 \
            --request-timeout 12 \
            --request-delay 0.8 \
            --request-jitter 1.0 \
            --report-json scrape-supplementary-report.json \
            --failed-ids-output failed-supplementary-ids.txt

      - name: Prepare skipped supplementary report
        if: steps.live-scrape-quality.outputs.commit_ok != 'true'
        run: |
          printf '{"results":[]}\n' > scrape-supplementary-report.json
          : > failed-supplementary-ids.txt

      - name: Prepare failed declaration retry list
        run: |
          sort -u failed-live-ids.txt failed-supplementary-ids.txt > failed-ids.txt

      - name: Retry failed declarations at low concurrency
        if: steps.live-scrape-quality.outputs.commit_ok == 'true'
        timeout-minutes: 60
        run: |
          if [ -s failed-ids.txt ]; then
            uv run python scrape.py --workers 1 --data-dir ../data-branch/data \
              --user-ids-file failed-ids.txt \
              --request-retries 1 \
              --request-timeout 12 \
              --request-delay 1.0 \
              --request-jitter 1.5 \
              --report-json scrape-second-pass-report.json \
              --failed-ids-output failed-ids-second-pass.txt
          else
            printf '{"results":[]}\n' > scrape-second-pass-report.json
            : > failed-ids-second-pass.txt
          fi

      - name: Prepare skipped retry report
        if: steps.live-scrape-quality.outputs.commit_ok != 'true'
        run: |
          cp scrape-live-report.json scrape-second-pass-report.json
          cp failed-live-ids.txt failed-ids-second-pass.txt

      - name: Summarize scrape health
        id: scrape-quality
        if: always()
        run: |
          uv run python .github/scripts/scrape_health.py \
            --report scrape-live-report.json \
            --report scrape-supplementary-report.json \
            --report scrape-second-pass-report.json \
            --combined-report scrape-combined-report.json \
            --github-output "$GITHUB_OUTPUT" \
            --step-summary "$GITHUB_STEP_SUMMARY" \
            --repo "$GITHUB_REPOSITORY" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --emit-annotation

      - name: Upload scrape health reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scrape-health-${{ github.run_id }}
          path: |
            scrape-live-report.json
            scrape-supplementary-report.json
            scrape-second-pass-report.json
            scrape-combined-report.json
            failed-live-ids.txt
            failed-supplementary-ids.txt
            failed-ids.txt
            failed-ids-second-pass.txt
          if-no-files-found: ignore

      - name: Notify Discord about scrape health warnings
        if: steps.scrape-quality.outputs.notify == 'true' && steps.live-scrape-quality.outputs.notify != 'true'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          uv run python .github/scripts/scrape_health.py \
            --report scrape-live-report.json \
            --report scrape-supplementary-report.json \
            --report scrape-second-pass-report.json \
            --repo "$GITHUB_REPOSITORY" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --discord

      - name: Generate declaration content hashes
        if: steps.live-scrape-quality.outputs.commit_ok == 'true'
        run: |
          uv run python generate_content_hashes.py \
            --data-dir ../data-branch/data \
            --output ../data-branch/data/_checks/content-hashes.json

      - name: Guard against suspicious data loss
        if: steps.live-scrape-quality.outputs.commit_ok == 'true'
        run: |
          before=${{ steps.before-count.outputs.value }}
          after=$(find ../data-branch/data -maxdepth 1 -name '*.yaml' | wc -l | tr -d ' ')
          drop=$((before - after))

          if [ "$before" -gt 0 ] && [ "$after" -lt "$before" ] && [ "$drop" -gt 25 ] && [ $((after * 100)) -lt $((before * 95)) ]; then
            echo "Refusing to commit a suspicious drop from $before to $after declarations."
            exit 1
          fi

      - name: Detect latest reporting year
        id: latest-year
        if: steps.live-scrape-quality.outputs.commit_ok == 'true'
        run: |
          latest_year=$(python - <<'PY'
          from pathlib import Path
          import yaml

          latest = 0
          for path in Path("../data-branch/data").glob("*.yaml"):
              data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
              year = data.get("year")
              if isinstance(year, int):
                  latest = max(latest, year)

          if not latest:
              raise SystemExit("No scraped declarations found.")

          print(latest)
          PY
          )
          echo "value=$latest_year" >> "$GITHUB_OUTPUT"

      - name: Commit updated data snapshot
        id: commit-data
        if: steps.scrape-quality.outputs.commit_ok == 'true' && steps.live-scrape-quality.outputs.commit_ok == 'true'
        working-directory: ../data-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream data changes detected."
            exit 0
          fi

          uv run --project "$GITHUB_WORKSPACE" \
            python "$GITHUB_WORKSPACE/.github/scripts/data_commit_message.py" \
            --repo . \
            --latest-year "${{ steps.latest-year.outputs.value }}" \
            --output commit-message.txt

          git commit -F commit-message.txt

          git push origin HEAD:data
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Skip data commit after low-quality scrape
        if: steps.scrape-quality.outputs.commit_ok != 'true' || steps.live-scrape-quality.outputs.commit_ok != 'true'
        run: |
          echo "Skipping data commit because scrape error rate exceeded the quality gate."

      - name: Trigger Pages rebuild
        if: steps.commit-data.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Notify Discord about changed declarations
        if: steps.commit-data.outputs.changed == 'true'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          uv run python .github/scripts/discord_data_summary.py \
            --data-repo ../data-branch \
            --repo "$GITHUB_REPOSITORY" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --latest-year "${{ steps.latest-year.outputs.value }}"

      - name: Fail on severe scrape health errors
        if: steps.scrape-quality.outputs.hard_fail == 'true'
        run: |
          echo "Scrape error rate exceeded the hard failure threshold."
          exit 1

      - name: Clean up worktree
        if: always()
        run: git worktree remove ../data-branch --force
